<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#1a1a1a"/>
<title>Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f3ef;
  --ink:#1a1a1a;
  --ink2:#666;
  --ink3:#aaa;
  --surface:#fff;
  --border:#e0ddd8;
  --accent:#2d6a4f;
  --accent-light:#d8f3e3;
  --accent-mid:#52b788;
  --red:#c1121f;
  --red-light:#fce4e6;
  --amber:#e07c24;
  --amber-light:#fef3e2;
  --r:10px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.header{
  background:var(--ink);
  padding:0 16px;
  position:sticky;top:0;z-index:100;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo em{font-style:italic;color:var(--accent-mid)}
.header-actions{display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.2)}

/* ── TABS ── */
.tabs{display:flex;background:var(--ink);border-top:1px solid rgba(255,255,255,.08);padding:0 8px}
.tab{flex:1;padding:10px 4px 11px;font-size:12px;font-weight:600;color:rgba(255,255,255,.45);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;font-family:'DM Sans',sans-serif}
.tab.active{color:#fff;border-bottom-color:var(--accent-mid)}

/* ── PAGES ── */
.page{display:none;padding:16px;max-width:540px;margin:0 auto;padding-bottom:40px}
.page.active{display:block}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}

/* ── SECTION LABELS ── */
.section-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}

/* ── INPUTS ── */
input,select,textarea{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--ink);
  font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border .15s;
  -webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--accent)}
label{font-size:12px;font-weight:600;color:var(--ink2);display:block;margin-bottom:5px;letter-spacing:.02em}
.row{display:flex;gap:8px;margin-bottom:10px}
.row>*{flex:1;min-width:0}
.field{margin-bottom:10px}

/* ── BUTTONS ── */
button{font-family:'DM Sans',sans-serif;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;font-size:14px;font-weight:600;border:none;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#245c43}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--ink)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;border:1.5px solid var(--border);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.btn-icon-sm{background:none;border:none;padding:4px;color:var(--ink3);font-size:16px;display:inline-flex;align-items:center;border-radius:6px}
.btn-icon-sm:hover{color:var(--red);background:var(--red-light)}

/* ── AVATAR ── */
.av{width:30px;height:30px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Mono',monospace}
.av-sm{width:24px;height:24px;font-size:10px}

/* ── MEMBER CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 8px 5px 6px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500}
.chip-remove{background:none;border:none;padding:0;color:var(--ink3);cursor:pointer;display:flex;align-items:center;line-height:1}
.chip-remove:hover{color:var(--red)}

/* ── LIST ITEMS ── */
.list-item{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.item-title{font-size:14px;font-weight:600;margin-bottom:2px}
.item-meta{font-size:12px;color:var(--ink2)}
.item-amt{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;white-space:nowrap}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.badge-green{background:var(--accent-light);color:var(--accent)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-gray{background:var(--bg);color:var(--ink2);border:1px solid var(--border)}

/* ── CATEGORY ── */
.cat-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.cat-food{background:#dcfce7;color:#166534}
.cat-transport{background:#dbeafe;color:#1e40af}
.cat-accommodation{background:#ede9fe;color:#5b21b6}
.cat-drinks{background:#fef3c7;color:#92400e}
.cat-activities{background:#fce7f3;color:#9d174d}
.cat-others{background:#f1f5f9;color:#475569}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--shadow)}
.metric-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.metric-value{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--ink)}
.metric-value.green{color:var(--accent)}

/* ── SETTLEMENT ── */
.settle-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg);border-radius:8px;margin-bottom:7px;border:1px solid var(--border)}
.settle-item.done{opacity:.45}
.settle-from-to{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:14px}
.settle-arrow{color:var(--ink3);font-size:13px}
.settle-amount{font-family:'DM Mono',monospace;font-weight:500}
.owe{color:var(--red)}
.gets{color:var(--accent)}

/* ── BALANCE LIST ── */
.bal-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.bal-item:last-child{border-bottom:none}
.bal-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}

/* ── HISTORY ── */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:border .15s;box-shadow:var(--shadow)}
.hist-card:hover{border-color:var(--accent)}
.hist-name{font-family:'Fraunces',serif;font-size:16px;font-weight:700;margin-bottom:3px}
.hist-meta{font-size:12px;color:var(--ink2);font-family:'DM Mono',monospace}
.hist-amt{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--accent)}

/* ── CUSTOM SPLIT ── */
.split-members{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px}
.split-chk{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;background:var(--surface);transition:all .15s}
.split-chk:has(input:checked){border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.split-chk input{display:none}

/* ── SHARE MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:20px 16px 36px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--ink2);margin-bottom:16px}

/* ── RECEIPT CANVAS ── */
#share-canvas{display:block;width:100%;border-radius:8px;border:1px solid var(--border);margin-bottom:12px}

/* ── EMPTY ── */
.empty{text-align:center;padding:32px 16px;color:var(--ink3);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── HISTORY MODAL ── */
.history-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.history-modal.open{display:flex}
.history-sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;padding:20px 16px 36px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:14px 0}

select option{background:var(--surface);color:var(--ink)}

/* ── CUSTOM SPLIT TOGGLE ── */
.split-toggle{display:flex;gap:6px;margin-bottom:10px}
.split-toggle button{flex:1;padding:8px;font-size:12px;font-weight:600;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.split-toggle button.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">Gast<em>os</em></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openHistory()" title="History">🕐</button>
      <button class="icon-btn" onclick="confirmClear()" title="New outing">✕</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('setup',this)">Setup</button>
    <button class="tab" onclick="switchTab('expenses',this)">Expenses</button>
    <button class="tab" onclick="switchTab('settlement',this)">Settlement</button>
  </div>
</div>

<!-- ══════════════════ SETUP ══════════════════ -->
<div id="tab-setup" class="page active">

  <div class="card">
    <div class="section-label">Outing</div>
    <div class="field">
      <label>Name</label>
      <input id="outing-name" type="text" placeholder="e.g. Beach Trip, Bohol 2025" oninput="save()"/>
    </div>
    <div class="row">
      <div>
        <label>Date</label>
        <input id="outing-date" type="date" oninput="save()"/>
      </div>
      <div>
        <label>Destination</label>
        <input id="outing-dest" type="text" placeholder="e.g. Batangas" oninput="save()"/>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Members</div>
    <div class="row">
      <input id="m-input" type="text" placeholder="Add a name..." maxlength="30" onkeydown="if(event.key==='Enter')addMember()"/>
      <button class="btn btn-primary btn-sm" onclick="addMember()" style="flex:none;white-space:nowrap">+ Add</button>
    </div>
    <div class="chips" id="chips-wrap"></div>
    <div id="member-count" style="font-size:12px;color:var(--ink3);margin-top:8px"></div>
  </div>

</div>

<!-- ══════════════════ EXPENSES ══════════════════ -->
<div id="tab-expenses" class="page">

  <div class="card">
    <div class="section-label">Add Expense</div>
    <div class="field">
      <label>Description</label>
      <input id="e-name" type="text" placeholder="e.g. Lunch, Boat hire"/>
    </div>
    <div class="row">
      <div>
        <label>Amount (₱)</label>
        <input id="e-amount" type="number" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div>
        <label>Category</label>
        <select id="e-cat">
          <option value="food">🍽 Food</option>
          <option value="transport">🚗 Transport</option>
          <option value="accommodation">🏠 Stay</option>
          <option value="drinks">🍻 Drinks</option>
          <option value="activities">🎉 Activities</option>
          <option value="others">📦 Others</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Paid by</label>
      <select id="e-payer"><option value="">Select payer...</option></select>
    </div>
    <div class="field">
      <label>Split</label>
      <div class="split-toggle">
        <button class="active" id="split-all-btn" onclick="setSplitMode('all')">Everyone</button>
        <button id="split-custom-btn" onclick="setSplitMode('custom')">Custom</button>
      </div>
      <div id="custom-split-wrap" style="display:none">
        <div class="split-members" id="split-members"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addExpense()">Add Expense</button>
  </div>

  <div id="expense-summary" style="display:none" class="card" style="padding:12px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-label" style="margin:0">Total</div>
      <div id="exp-total" style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--accent)"></div>
    </div>
  </div>

  <div id="expense-list"></div>
</div>

<!-- ══════════════════ SETTLEMENT ══════════════════ -->
<div id="tab-settlement" class="page">

  <div class="metrics" id="settle-metrics"></div>

  <div class="card">
    <div class="section-label">Who pays who</div>
    <div id="settlement-list"></div>
  </div>

  <div class="card">
    <div class="section-label">Individual balances</div>
    <div id="balance-list"></div>
  </div>

  <button class="btn btn-ghost btn-block" onclick="openShareModal()" style="margin-top:4px">
    📸 Share Breakdown
  </button>
</div>

<!-- ══════════════════ SHARE MODAL ══════════════════ -->
<div class="modal-overlay" id="share-modal" onclick="e=>e.target===this&&closeShare()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Receipt</div>
    <div class="modal-sub">Save or share the breakdown image</div>
    <canvas id="share-canvas"></canvas>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="downloadReceipt()">⬇ Save Image</button>
      <button class="btn btn-ghost" style="flex:none;padding:10px 14px" onclick="closeShare()">✕</button>
    </div>
  </div>
</div>

<!-- ══════════════════ HISTORY MODAL ══════════════════ -->
<div class="history-modal" id="history-modal">
  <div class="history-sheet">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="modal-title" style="margin:0">Past Outings</div>
      <button class="btn btn-ghost btn-sm" onclick="closeHistory()">Close</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────
const KEY = 'gastos_v2';
const HKEY = 'gastos_history_v2';

let S = {
  name: '',
  date: '',
  dest: '',
  members: [],
  expenses: [],
  payments: [],
};

let splitMode = 'all';

const CAT = { food:'Food', transport:'Transport', accommodation:'Stay', drinks:'Drinks', activities:'Activities', others:'Others' };

function save(){
  S.name = v('outing-name');
  S.date = v('outing-date');
  S.dest = v('outing-dest');
  localStorage.setItem(KEY, JSON.stringify(S));
}

function load(){
  try {
    const raw = localStorage.getItem(KEY);
    if(raw) S = { ...S, ...JSON.parse(raw) };
  } catch(e){}
  set('outing-name', S.name);
  set('outing-date', S.date);
  set('outing-dest', S.dest);
  renderMembers();
  renderPayerDropdown();
  renderExpenses();
  renderSettlement();
}

function v(id){ return document.getElementById(id)?.value ?? ''; }
function set(id, val){ const el=document.getElementById(id); if(el) el.value=val||''; }

// ── TABS ──────────────────────────────────────────────────
function switchTab(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='settlement') renderSettlement();
}

// ── TOAST ──────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── MEMBERS ──────────────────────────────────────────────────
function initials(n){ return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

function addMember(){
  const inp = document.getElementById('m-input');
  const name = inp.value.trim();
  if(!name){ toast('Enter a name.'); return; }
  if(S.members.includes(name)){ toast('Already added.'); return; }
  S.members.push(name);
  inp.value='';
  save(); renderMembers(); renderPayerDropdown(); renderCustomSplit();
}

function removeMember(name){
  if(S.expenses.some(e=>e.payer===name)){
    if(!confirm(`${name} has paid expenses. Remove anyway?`)) return;
  }
  S.members = S.members.filter(m=>m!==name);
  S.expenses = S.expenses.map(e=>({...e, splitWith:(e.splitWith||[]).filter(m=>m!==name)}));
  save(); renderMembers(); renderPayerDropdown(); renderCustomSplit();
}

function renderMembers(){
  const wrap = document.getElementById('chips-wrap');
  const count = document.getElementById('member-count');
  if(!S.members.length){
    wrap.innerHTML='';
    count.textContent='No members yet.';
    return;
  }
  wrap.innerHTML = S.members.map(m=>`
    <span class="chip">
      <div class="av av-sm">${initials(m)}</div>
      ${m}
      <button class="chip-remove" onclick="removeMember('${esc(m)}')" title="Remove">✕</button>
    </span>`).join('');
  count.textContent = `${S.members.length} member${S.members.length>1?'s':''}`;
}

// ── EXPENSES ──────────────────────────────────────────────────
function renderPayerDropdown(){
  const sel = document.getElementById('e-payer');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Select payer...</option>' + S.members.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${m}</option>`).join('');
}

function setSplitMode(mode){
  splitMode = mode;
  document.getElementById('split-all-btn').classList.toggle('active', mode==='all');
  document.getElementById('split-custom-btn').classList.toggle('active', mode==='custom');
  document.getElementById('custom-split-wrap').style.display = mode==='custom'?'block':'none';
  if(mode==='custom') renderCustomSplit();
}

function renderCustomSplit(){
  const wrap = document.getElementById('split-members');
  wrap.innerHTML = S.members.map(m=>`
    <label class="split-chk">
      <input type="checkbox" value="${m}" checked/> ${m}
    </label>`).join('');
}

function addExpense(){
  const name = document.getElementById('e-name').value.trim();
  const amt = parseFloat(document.getElementById('e-amount').value)||0;
  const cat = document.getElementById('e-cat').value;
  const payer = document.getElementById('e-payer').value;
  if(!name){ toast('Add a description.'); return; }
  if(!amt){ toast('Enter an amount.'); return; }
  if(!payer){ toast('Select who paid.'); return; }
  if(S.members.length < 2){ toast('Add at least 2 members first.'); return; }
  let sw = [...S.members];
  if(splitMode==='custom'){
    sw = [...document.querySelectorAll('#split-members input:checked')].map(i=>i.value);
    if(!sw.length){ toast('Select at least 1 person for the split.'); return; }
  }
  S.expenses.push({
    id: Date.now(),
    name, amount: amt, cat, payer,
    splitWith: sw,
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})
  });
  document.getElementById('e-name').value='';
  document.getElementById('e-amount').value='';
  setSplitMode('all');
  save(); renderExpenses();
  toast('Expense added!');
}

function removeExpense(id){
  S.expenses = S.expenses.filter(e=>e.id!==id);
  save(); renderExpenses();
}

function peso(n){ return '₱'+Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function renderExpenses(){
  const list = document.getElementById('expense-list');
  const summary = document.getElementById('expense-summary');
  const total = S.expenses.reduce((s,e)=>s+e.amount,0);
  if(!S.expenses.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🧾</div>No expenses yet.</div>`;
    summary.style.display='none';
    return;
  }
  summary.style.display='block';
  document.getElementById('exp-total').textContent=peso(total);
  list.innerHTML = [...S.expenses].reverse().map(e=>{
    const sw = e.splitWith||S.members;
    const perPerson = sw.length ? e.amount/sw.length : 0;
    return `<div class="card" style="padding:12px 14px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="item-title">${e.name}</div>
          <div class="item-meta" style="margin-top:4px;display:flex;flex-wrap:wrap;gap:5px;align-items:center">
            <span class="cat-pill cat-${e.cat}">${CAT[e.cat]}</span>
            <span>Paid by <strong>${e.payer}</strong></span>
            <span>· ${e.date}</span>
          </div>
          <div style="font-size:11px;color:var(--ink3);margin-top:4px">
            Split: ${sw.join(', ')} · ${peso(perPerson)}/person
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="item-amt">${peso(e.amount)}</div>
          <button class="btn-icon-sm" onclick="removeExpense(${e.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── SETTLEMENT ──────────────────────────────────────────────────
function computeBalances(){
  const bal = {};
  S.members.forEach(m=>bal[m]=0);
  S.expenses.forEach(e=>{
    const sw = e.splitWith||S.members;
    const share = e.amount/sw.length;
    sw.forEach(m=>{ if(bal[m]!==undefined) bal[m]-=share; });
    if(bal[e.payer]!==undefined) bal[e.payer]+=e.amount;
  });
  return bal;
}

function computeTransactions(bal){
  const cr=[], db=[];
  Object.entries(bal).forEach(([m,b])=>{
    const v=parseFloat(b.toFixed(2));
    if(v>0.01) cr.push([m,v]);
    else if(v<-0.01) db.push([m,-v]);
  });
  cr.sort((a,b)=>b[1]-a[1]); db.sort((a,b)=>b[1]-a[1]);
  const txns=[];
  while(cr.length&&db.length){
    const [cm,cv]=cr[0]; const [dm,dv]=db[0];
    const amt=Math.min(cv,dv);
    txns.push({id:`${dm}-${cm}`,from:dm,to:cm,amount:amt});
    cr[0][1]-=amt; db[0][1]-=amt;
    if(cr[0][1]<0.01) cr.shift();
    if(db[0][1]<0.01) db.shift();
  }
  return txns;
}

function togglePaid(id){
  if(!S.payments) S.payments=[];
  const i=S.payments.indexOf(id);
  if(i>-1) S.payments.splice(i,1); else S.payments.push(id);
  save(); renderSettlement();
}

function renderSettlement(){
  const bal = computeBalances();
  const total = S.expenses.reduce((s,e)=>s+e.amount,0);
  const txns = computeTransactions(bal);

  // metrics
  const perHead = S.members.length ? total/S.members.length : 0;
  document.getElementById('settle-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value">${peso(total)}</div></div>
    <div class="metric"><div class="metric-label">Per head</div><div class="metric-value green">${peso(perHead)}</div></div>
    <div class="metric"><div class="metric-label">Transfers</div><div class="metric-value">${txns.length}</div></div>`;

  // settlement list
  const sl = document.getElementById('settlement-list');
  if(!S.members.length){
    sl.innerHTML='<div class="empty" style="padding:16px 0">Add members in Setup first.</div>';
  } else if(!txns.length){
    sl.innerHTML=`<div style="text-align:center;padding:20px 0"><span class="badge badge-green" style="font-size:13px;padding:8px 16px">✓ All settled up!</span></div>`;
  } else {
    sl.innerHTML = txns.map(t=>{
      const done=(S.payments||[]).includes(t.id);
      return `<div class="settle-item ${done?'done':''}">
        <div class="settle-from-to">
          <div class="av av-sm">${initials(t.from)}</div>
          <strong>${t.from}</strong>
          <span class="settle-arrow">→</span>
          <div class="av av-sm">${initials(t.to)}</div>
          <strong>${t.to}</strong>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="settle-amount owe">${peso(t.amount)}</span>
          <button class="btn btn-sm ${done?'btn-ghost':'btn-primary'}" onclick="togglePaid('${t.id}')">${done?'Undo':'Paid'}</button>
        </div>
      </div>`;
    }).join('');
  }

  // balance list
  const bl = document.getElementById('balance-list');
  if(!S.members.length){ bl.innerHTML=''; return; }
  bl.innerHTML = Object.entries(bal).sort((a,b)=>b[1]-a[1]).map(([m,b])=>`
    <div class="bal-item">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="av av-sm">${initials(m)}</div>
        <span style="font-size:14px;font-weight:500">${m}</span>
      </div>
      <span class="bal-val ${b>0.01?'gets':b<-0.01?'owe':''}">
        ${b>0.01?'+':''}${peso(b)} ${b>0.01?'gets back':b<-0.01?'owes':'✓'}
      </span>
    </div>`).join('');
}

// ── HISTORY ──────────────────────────────────────────────────
function getHistory(){ try{ return JSON.parse(localStorage.getItem(HKEY)||'[]'); }catch(e){ return []; } }
function saveToHistory(){
  if(!S.expenses.length) return;
  const hist = getHistory();
  const snap = { ...JSON.parse(JSON.stringify(S)), savedAt: Date.now() };
  hist.unshift(snap);
  localStorage.setItem(HKEY, JSON.stringify(hist.slice(0,20)));
  toast('Saved to history!');
}

function openHistory(){
  const hist = getHistory();
  const el = document.getElementById('history-list');
  if(!hist.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📂</div>No past outings saved yet.</div>';
  } else {
    el.innerHTML = hist.map((h,i)=>{
      const total = (h.expenses||[]).reduce((s,e)=>s+e.amount,0);
      const d = new Date(h.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      return `<div class="hist-card" onclick="loadHistory(${i})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="hist-name">${h.name||'Unnamed Outing'}</div>
            <div class="hist-meta">${h.dest||''} · ${h.members?.length||0} people · ${d}</div>
          </div>
          <div class="hist-amt">${peso(total)}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('history-modal').classList.add('open');
}

function loadHistory(i){
  const hist = getHistory();
  if(!hist[i]) return;
  if(!confirm('Load this outing? Current data will be replaced.')) return;
  S = hist[i];
  localStorage.setItem(KEY, JSON.stringify(S));
  set('outing-name',S.name); set('outing-date',S.date); set('outing-dest',S.dest);
  renderMembers(); renderPayerDropdown(); renderExpenses(); renderSettlement();
  closeHistory();
  toast('Outing loaded!');
}

function closeHistory(){ document.getElementById('history-modal').classList.remove('open'); }

// ── CLEAR ──────────────────────────────────────────────────
function confirmClear(){
  if(!confirm('Save this outing to history and start a new one?')) return;
  saveToHistory();
  S = { name:'', date:'', dest:'', members:[], expenses:[], payments:[] };
  localStorage.setItem(KEY, JSON.stringify(S));
  set('outing-name',''); set('outing-date',''); set('outing-dest','');
  setSplitMode('all');
  renderMembers(); renderPayerDropdown(); renderExpenses(); renderSettlement();
  switchTab('setup', document.querySelector('.tab'));
  toast('New outing started!');
}

// ── SHARE / RECEIPT ──────────────────────────────────────────────────
function openShareModal(){
  if(!S.expenses.length){ toast('No expenses to share yet.'); return; }
  drawReceipt();
  document.getElementById('share-modal').classList.add('open');
}
function closeShare(){ document.getElementById('share-modal').classList.remove('open'); }

function drawReceipt(){
  const canvas = document.getElementById('share-canvas');
  const DPR = Math.min(window.devicePixelRatio||1, 2);
  const W = 400;
  const PADDING = 28;

  const total = S.expenses.reduce((s,e)=>s+e.amount,0);
  const perHead = S.members.length ? total/S.members.length : 0;
  const bal = computeBalances();
  const txns = computeTransactions(bal);

  // ── measure height first ──
  let height = 0;
  height += 56; // header
  height += 28; // outing name
  height += 16; // date/dest or spacing
  height += 24; // divider area
  height += S.expenses.length * 38 + 16;
  height += 24; // divider
  height += 60; // totals
  height += 24; // divider
  height += txns.length ? txns.length * 28 + 40 : 44;
  height += 36; // footer
  height += 32; // padding

  canvas.width = W * DPR;
  canvas.height = height * DPR;
  canvas.style.width = '100%';
  canvas.style.height = 'auto';

  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // background
  ctx.fillStyle = '#fafaf8';
  ctx.fillRect(0, 0, W, height);

  let y = 0;

  // ── header band ──
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, 52);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('Gastos', W/2, 34);

  y = 52;

  // ── outing info ──
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 15px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(S.name || 'Outing Expense Breakdown', W/2, y + 22);
  y += 22;

  if(S.dest || S.date){
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    const info = [S.dest, S.date].filter(Boolean).join(' · ');
    ctx.fillText(info, W/2, y + 16);
    y += 16;
  }
  y += 8;

  // ── dash line ──
  function dashedLine(yy){
    ctx.setLineDash([4,4]);
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PADDING, yy); ctx.lineTo(W-PADDING, yy); ctx.stroke();
    ctx.setLineDash([]);
  }
  function solidLine(yy){
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PADDING, yy); ctx.lineTo(W-PADDING, yy); ctx.stroke();
  }

  dashedLine(y+6); y += 18;

  // ── EXPENSES ──
  ctx.font = '9px monospace';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText('EXPENSES', PADDING, y);
  y += 14;

  S.expenses.forEach(e=>{
    const sw = e.splitWith||S.members;
    ctx.font = '12px Arial, sans-serif';
    ctx.fillStyle = '#1a1a1a';
    ctx.textAlign = 'left';
    const label = e.name.length > 28 ? e.name.slice(0,26)+'…' : e.name;
    ctx.fillText(label, PADDING, y);
    ctx.font = '500 12px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('₱'+e.amount.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}), W-PADDING, y);
    y += 14;
    ctx.font = '10px Arial, sans-serif';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'left';
    ctx.fillText(`${e.payer} paid · ÷${sw.length}`, PADDING, y);
    y += 18;
  });

  y += 4; dashedLine(y); y += 14;

  // ── TOTALS ──
  function row2(left, right, opts={}){
    ctx.font = `${opts.bold?'bold ':''} ${opts.size||12}px ${opts.mono?'monospace':'Arial, sans-serif'}`;
    ctx.fillStyle = opts.color||'#1a1a1a';
    ctx.textAlign='left'; ctx.fillText(left, PADDING, y);
    ctx.textAlign='right'; ctx.fillText(right, W-PADDING, y);
    y += opts.gap||18;
  }

  row2('TOTAL', peso2(total), {bold:true, size:13});
  row2('MEMBERS', `${S.members.length} people`, {color:'#666', size:12});
  y += 4; solidLine(y); y += 12;
  row2('PER HEAD', peso2(perHead), {bold:true, size:16, color:'#2d6a4f', mono:true, gap:22});
  solidLine(y); y += 14;

  // ── SETTLEMENT ──
  ctx.font = '9px monospace';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText('SETTLEMENT', PADDING, y);
  y += 14;

  if(!txns.length){
    ctx.font = 'bold 12px Arial, sans-serif';
    ctx.fillStyle = '#2d6a4f';
    ctx.textAlign = 'center';
    ctx.fillText('✓  All settled up!', W/2, y+4);
    y += 22;
  } else {
    txns.forEach(t=>{
      ctx.font = '12px Arial, sans-serif';
      ctx.fillStyle = '#1a1a1a';
      ctx.textAlign = 'left';
      ctx.fillText(`${t.from}  →  ${t.to}`, PADDING, y);
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = '#c1121f';
      ctx.textAlign = 'right';
      ctx.fillText(peso2(t.amount), W-PADDING, y);
      y += 22;
    });
  }

  y += 6; dashedLine(y); y += 16;

  // ── footer ──
  ctx.font = '11px Arial, sans-serif';
  ctx.fillStyle = '#bbb';
  ctx.textAlign = 'center';
  const now = new Date().toLocaleString('en-PH',{dateStyle:'medium',timeStyle:'short'});
  ctx.fillText('Generated by Gastos · ' + now, W/2, y);
}

function peso2(n){
  return '₱'+Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function downloadReceipt(){
  const canvas = document.getElementById('share-canvas');
  const a = document.createElement('a');
  a.download = `gastos-${(S.name||'receipt').toLowerCase().replace(/\s+/g,'-')}.png`;
  a.href = canvas.toDataURL('image/png',1.0);
  a.click();
}

// ── UTILS ──────────────────────────────────────────────────
function esc(s){ return s.replace(/'/g,"\\'"); }

// ── INIT ──────────────────────────────────────────────────
load();
</script>
